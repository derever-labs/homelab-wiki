name: VitePress Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build VitePress
        id: build
        run: npx vitepress build docs 2>&1 | tee /tmp/vitepress-build.log
        continue-on-error: true

      - name: Fallback-Build (Dead Links ignoriert)
        if: steps.build.outcome == 'failure'
        run: |
          echo "::warning::VitePress Build fehlgeschlagen (vermutlich Dead Links). Fallback-Build ohne Link-Pruefung."
          grep -i "dead link" /tmp/vitepress-build.log | while read -r line; do
            echo "::warning::$line"
          done
          VITEPRESS_IGNORE_DEAD_LINKS=true npx vitepress build docs

      - name: GitHub Issue bei Dead Links
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/vitepress-build.log', 'utf8');
            const deadLinks = log.split('\n')
              .filter(l => l.toLowerCase().includes('dead link'))
              .map(l => `- ${l.trim()}`)
              .join('\n');

            if (!deadLinks) return;

            const title = 'Dead Links im Wiki gefunden';
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dead-links'
            });

            const body = `Der VitePress Build hat Dead Links gefunden. Das Wiki wurde trotzdem deployed (Fallback-Build).\n\n${deadLinks}\n\n*Commit: ${context.sha.slice(0,8)} von ${context.actor}*`;

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dead-links']
              });
            }

      - name: Dead-Links Issue schliessen
        if: steps.build.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dead-links'
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

      - name: Trigger wiki rebuild
        continue-on-error: true
        run: |
          curl -s --max-time 120 \
            "https://wiki.ackermannprivat.ch/_webhook/cgi-bin/pull?token=${{ secrets.WIKI_WEBHOOK_TOKEN }}"
